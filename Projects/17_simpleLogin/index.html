<!DOCTYPE html>
<html lang='en'>

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>

</head>

<body>
    <div id="checklist"></div>

    <script>
        let checklistData = [];

        fetch(`data.json?t=${Date.now()}`)
            .then(response => response.json())
            .then(data => {

                checklistData = data;

                let html = "";

                data.forEach(topic => {
                    html += `<h3>${topic.topic}</h3>`;
                    html += "<ul>";

                    topic.checklist.forEach(item => {
                        html += `
                    <li>
                        <input
                            type="checkbox"
                            data-id="${item.id}"
                            ${item.status === "true" ? "checked" : ""}
                        >
                        ${item.name}
                    </li>
                `;
                    });

                    html += "</ul>";
                });

                document.getElementById("checklist").innerHTML = html;

                document
                    .querySelectorAll("#checklist input[type='checkbox']")
                    .forEach(checkbox => {

                        checkbox.addEventListener("change", async function () {

                            const itemId = this.dataset.id;
                            const newStatus = this.checked;

                            // update dữ liệu local
                            checklistData.forEach(topic => {

                                const item =
                                    topic.checklist.find(x => x.id === itemId);

                                if (item) {
                                    item.status = String(newStatus);
                                }
                            });

                            await save(checklistData);
                        });
                    });
            })
            .catch(console.error);

        async function save(data) {

            const token = localStorage.getItem("github_token");

            const api =
                "https://api.github.com/repos/" +
                "tianangnho/tianangnho.github.io/" +
                "contents/Projects/17_simpleLogin/data.json";

            try {

                // Lấy SHA hiện tại
                const r = await fetch(api, {
                    headers: {
                        Authorization: `Bearer ${token}`
                    }
                });

                const file = await r.json();

                // GitHub yêu cầu Base64 UTF-8
                const content = btoa(
                    unescape(
                        encodeURIComponent(
                            JSON.stringify(data, null, 2)
                        )
                    )
                );

                const update = await fetch(api, {
                    method: "PUT",
                    headers: {
                        Authorization: `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: "Update checklist status",
                        content: content,
                        sha: file.sha
                    })
                });

                const result = await update.json();

                if (update.ok) {
                    console.log("Saved", result);
                } else {
                    console.error(result);
                    alert("Save failed");
                }

            } catch (err) {
                console.error(err);
            }
        }
    </script>
</body>

</html>
